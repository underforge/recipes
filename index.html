<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aaron's Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --ink: #1c1a18;
      --muted: #6b6560;
      --accent: #c07a3a;
      --border: #e8e4de;
      --card-bg: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      padding: 3rem 2rem 2rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
      font-weight: 300;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .recipe-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .recipe-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    .recipe-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .recipe-card-body {
      padding: 1rem 1.2rem 1.2rem;
    }

    .recipe-card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.4;
    }

    .recipe-card-body .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 0.15em 0.5em;
      margin-top: 0.6rem;
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Aaron's Recipes</h1>
    <p>Things I've cooked and liked.</p>
  </header>
  <main>
    <div class="recipe-grid">
      <a class="recipe-card" href="recipes/baked-zucchini-chickpea-curry.html">
        <img src="https://www.veganricha.com/wp-content/uploads/2024/10/Baked-Chickpea-Zucchini-Curry-3617.jpg" alt="Baked Zucchini Chickpea Curry" />
        <div class="recipe-card-body">
          <h2>Baked Zucchini Chickpea Curry</h2>
          <p class="meta">45 min · 4 servings</p>
          <span class="tag">Modified</span>
        </div>
      </a>
    
      <a class="recipe-card" href="recipes/moroccan-style-chickpea-stew.html">
        <img src="https://bestofvegancom.b-cdn.net/wp-content/uploads/2023/05/Devorah-Bowen-09628-scaled.jpg" alt="Moroccan-Style Chickpea Stew served over couscous" />
        <div class="recipe-card-body">
          <h2>Moroccan-Style Chickpea Stew</h2>
          <p class="meta">65 min · 4 servings</p>
          <span class="tag">Modified</span>
        </div>
      </a>
    
      <a class="recipe-card" href="recipes/fresh-peach-cobbler.html">
        <img src="https://sallysbakingaddiction.com/wp-content/uploads/2016/08/delicious-peach-cobbler.jpg" alt="Fresh peach cobbler with golden biscuit topping" />
        <div class="recipe-card-body">
          <h2>Fresh Peach Cobbler</h2>
          <p class="meta">75 min · 10–12 servings</p>
        </div>
      </a>
    </div>
  </main>
  <footer>A personal recipe collection.</footer>
</body>
</html>
